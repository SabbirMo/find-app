name: Flutter CI
on:
    push: 
        branches: 
           - main

jobs: 
    test: 
        runs-on: ubuntu-latest
        steps: 
            - uses: actions/checkout@v2
            - uses: subosito/flutter-action@v2
              with:
                flutter-version: '3.44.1'
            - run: flutter pub get
            - run: flutter analyze

    build: 
        needs: test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v2
            - uses: subosito/flutter-action@v2
              with:
                flutter-version: '3.44.1'
            - run: flutter pub get
            - run: flutter build apk --release



